version: 2
updates:
  # NPM dependencies (CDK infrastructure)
  - package-ecosystem: "npm"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "YOUR_GITHUB_USERNAME"
    assignees:
      - "YOUR_GITHUB_USERNAME"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Auto-merge minor and patch updates
    allow:
      - dependency-type: "direct"
        update-type: "version-update:semver-patch"
      - dependency-type: "direct"
        update-type: "version-update:semver-minor"
      - dependency-type: "indirect"

  # Python dependencies (Lambda functions)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "YOUR_GITHUB_USERNAME"
    assignees:
      - "YOUR_GITHUB_USERNAME"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "YOUR_GITHUB_USERNAME"
    assignees:
      - "YOUR_GITHUB_USERNAME"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"