name: Simple Deploy Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-deploy:
    name: Test Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "🔍 Environment Debug:"
          echo "GitHub Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

      - name: Check secrets (masked)
        run: |
          echo "🔍 Secrets Check:"
          echo "AWS_ROLE_ARN length: ${#AWS_ROLE_ARN}"
          echo "AWS_ACCOUNT_ID length: ${#AWS_ACCOUNT_ID}"
          echo "DEEPAR_IMAGE_URI length: ${#DEEPAR_IMAGE_URI}"
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DEEPAR_IMAGE_URI: ${{ secrets.DEEPAR_IMAGE_URI }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-SimpleTest

      - name: Test AWS access
        run: |
          echo "🔍 Testing AWS access..."
          aws sts get-caller-identity
          echo "✅ AWS access successful"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          cdk --version

      - name: Install dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Bootstrap check
        working-directory: infra
        run: |
          echo "🔍 Checking CDK bootstrap status..."
          cdk bootstrap --show-template > /dev/null 2>&1 || echo "Bootstrap may be needed"

      - name: CDK Synth test
        working-directory: infra
        env:
          DEEPAR_IMAGE_URI: ${{ secrets.DEEPAR_IMAGE_URI }}
          BRAPI_SECRET_ID: ${{ secrets.BRAPI_SECRET_ID }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          echo "🔍 Testing CDK synth..."
          cdk synth --quiet
          echo "✅ CDK synth successful"

      - name: CDK Bootstrap
        working-directory: infra
        run: |
          echo "🔧 CDK Bootstrap..."
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-1 || echo "Bootstrap already exists"

      - name: CDK Deploy (REAL)
        working-directory: infra
        env:
          DEEPAR_IMAGE_URI: ${{ secrets.DEEPAR_IMAGE_URI }}
          BRAPI_SECRET_ID: ${{ secrets.BRAPI_SECRET_ID }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          echo "🚀 Starting REAL CDK deploy..."
          cdk deploy --require-approval never --outputs-file outputs.json
          echo "✅ CDK deploy successful"
          
          if [ -f outputs.json ]; then
            echo "📊 Deployment outputs:"
            cat outputs.json
          fi