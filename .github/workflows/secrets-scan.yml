name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  aws-credentials:
    name: AWS Credentials Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for AWS credentials
        run: |
          if grep -r -E "AKIA[0-9A-Z]{16}" . \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv \
            --exclude-dir=build --exclude-dir=.github \
            --exclude="*.md" --exclude="*.yml" --exclude="*.yaml" \
            --exclude=".env.example"; then
            echo "❌ AWS credentials found in code!"
            exit 1
          else
            echo "✅ No AWS credentials found"
          fi
