name: Security - Container & Lambda Scanning

on:
  push:
    branches: [ main ]
    paths:
      - 'ml/**'
      - 'Dockerfile*'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 12 * * 3'  # Quarta-feira às 12h UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-filesystem:
    name: Trivy - Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (JSON output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-filesystem-report
          path: trivy-results.json
          retention-days: 30

  python-requirements-scan:
    name: Scan Python Requirements
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan requirements.txt
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output requirements-audit.json \
            || true
        continue-on-error: true

      - name: Display vulnerabilities
        run: |
          pip-audit -r requirements.txt || true
        continue-on-error: true

      - name: Upload requirements audit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: requirements-audit-report
          path: requirements-audit.json
          retention-days: 30

  lambda-security-check:
    name: Lambda Security Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Lambda configurations
        run: |
          echo "Checking Lambda security best practices..."
          
          # Check for hardcoded secrets in Lambda code
          echo "1. Checking for hardcoded secrets..."
          if grep -r -i "password\|secret\|api_key\|token" ml/ \
            --include="*.py" \
            --exclude-dir=__pycache__ \
            | grep -v "# " \
            | grep -v "SecretManager" \
            | grep -v "get_secret" \
            | grep "="; then
            echo "⚠️ Potential hardcoded secrets found"
          else
            echo "✅ No hardcoded secrets detected"
          fi
          
          # Check for proper error handling
          echo "2. Checking error handling..."
          if ! grep -r "try:" ml/ --include="*.py" | grep -q .; then
            echo "⚠️ No try-except blocks found"
          else
            echo "✅ Error handling present"
          fi
          
          # Check for logging
          echo "3. Checking logging..."
          if ! grep -r "import logging" ml/ --include="*.py" | grep -q .; then
            echo "⚠️ No logging imports found"
          else
            echo "✅ Logging configured"
          fi
          
          # Check for environment variable usage
          echo "4. Checking environment variables..."
          if grep -r "os.environ" ml/ --include="*.py" | grep -q .; then
            echo "✅ Using environment variables"
          else
            echo "⚠️ No environment variables usage found"
          fi

  iam-policy-check:
    name: IAM Policy Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./infra
        run: npm install

      - name: Check IAM policies
        run: |
          echo "Checking for overly permissive IAM policies..."
          
          # Check for wildcard permissions
          if grep -r "\*" infra/lib/ --include="*.ts" | grep -i "action\|resource"; then
            echo "⚠️ Found wildcard permissions - review for least privilege"
          else
            echo "✅ No wildcard permissions found"
          fi
          
          # Check for admin access
          if grep -r "AdministratorAccess\|FullAccess" infra/lib/ --include="*.ts"; then
            echo "⚠️ Found admin/full access policies - review for least privilege"
          else
            echo "✅ No admin access policies found"
          fi
