name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'infra/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy-dashboard"
  cancel-in-progress: false

jobs:
  # ─── Build & Deploy Frontend to GitHub Pages (on every push to main) ────────
  deploy-frontend:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm install --legacy-peer-deps

      - name: Build dashboard
        working-directory: ./dashboard
        env:
          REACT_APP_API_BASE_URL: 'https://og8m3nnj60.execute-api.us-east-1.amazonaws.com/prod'
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          REACT_APP_ENVIRONMENT: production
          REACT_APP_VERSION: ${{ github.sha }}
          CI: false
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard/build
          cname: ''

      - name: Notify deployment
        if: always()
        run: |
          echo "::notice::Frontend deployment to GitHub Pages completed with status: ${{ job.status }}"

  # ─── Production Infrastructure + S3 Deploy (manual trigger) ─────────────────
  deploy-production:
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production

    env:
      DEPLOY_TIMESTAMP: ${{ github.run_id }}-${{ github.run_attempt }}
      PROD_STACK_NAME: B3TacticalRankingStackV2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # ── Deploy infrastructure (CDK) ──
      - name: Install CDK dependencies
        working-directory: ./infra
        run: npm install

      - name: Deploy production infrastructure
        working-directory: ./infra
        env:
          B3TR_STAGE: prod
          B3TR_BUCKET_PREFIX: b3tr
          B3TR_SSM_PREFIX: /b3tr
          BRAPI_SECRET_ID: brapi/pro/token
          ALERT_EMAIL: ${{ vars.PROD_ALERT_EMAIL || 'production-alerts@example.com' }}
        run: |
          npx cdk deploy ${{ env.PROD_STACK_NAME }} \
            --context stage=prod \
            --require-approval never \
            --outputs-file ../prod-outputs.json

      # ── Build & deploy frontend to S3 + GitHub Pages ──
      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm install --legacy-peer-deps

      - name: Build dashboard for production
        working-directory: ./dashboard
        env:
          REACT_APP_API_BASE_URL: ${{ vars.PROD_API_URL || 'https://og8m3nnj60.execute-api.us-east-1.amazonaws.com/prod' }}
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          REACT_APP_ENVIRONMENT: production
          REACT_APP_VERSION: ${{ github.sha }}
          CI: false
        run: npm run build

      - name: Deploy frontend to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ vars.AWS_REGION || 'us-east-1' }}
          BUCKET="b3tr-${ACCOUNT_ID}-${REGION}"
          aws s3 sync dashboard/build/ "s3://${BUCKET}/dashboard-prod/" \
            --delete \
            --cache-control "public, max-age=86400, s-maxage=31536000"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard/build

      # ── Health checks ──
      - name: Health check
        run: |
          echo "Checking Lambda functions..."
          LAMBDAS=$(aws lambda list-functions \
            --query "Functions[?contains(FunctionName, 'B3TacticalRanking')].FunctionName" \
            --output text || echo "")
          for FUNC in $LAMBDAS; do
            STATE=$(aws lambda get-function --function-name "$FUNC" \
              --query 'Configuration.State' --output text 2>/dev/null || echo "Unknown")
            echo "  $FUNC: $STATE"
          done

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.PROD_STACK_NAME }}" \
            --query 'Stacks[0].StackStatus' --output text || echo "UNKNOWN")
          echo "Stack status: $STACK_STATUS"

      # ── Tag release ──
      - name: Tag release
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          RELEASE_TAG="production-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$RELEASE_TAG" -m "Production deployment ${{ github.sha }}"
          git push origin "$RELEASE_TAG" || true
          echo "::notice::Release tagged: $RELEASE_TAG"

      - name: Notify production deployment
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Production deployment completed successfully"
          else
            echo "::error::Production deployment failed"
          fi
