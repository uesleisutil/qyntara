name: Security - Secrets Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Scan for Secrets with Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  trufflehog:
    name: Scan for Secrets with TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  aws-credentials-check:
    name: Check for AWS Credentials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for AWS credentials
        run: |
          echo "Scanning for AWS credentials patterns..."
          
          # Patterns to search for (only actual credentials, not variable names)
          patterns=(
            "AKIA[0-9A-Z]{16}"
          )
          
          found=0
          for pattern in "${patterns[@]}"; do
            if grep -r -E "$pattern" . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=.venv \
              --exclude-dir=build \
              --exclude-dir=dist \
              --exclude-dir=.github \
              --exclude="*.md" \
              --exclude="*.yml" \
              --exclude="*.yaml" \
              --exclude="*.test.js" \
              --exclude="*.test.ts" \
              --exclude="*.spec.js" \
              --exclude="*.spec.ts" \
              --exclude=".env.example" \
              --exclude=".env.local" \
              --exclude="*.sh"; then
              echo "⚠️ Found potential AWS credential: $pattern"
              found=1
            fi
          done
          
          if [ $found -eq 1 ]; then
            echo "❌ Potential AWS credentials found in code!"
            exit 1
          else
            echo "✅ No AWS credentials found in code"
          fi

  env-file-check:
    name: Check for Committed .env Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for .env files
        run: |
          echo "Checking for committed .env files..."
          
          if find . -name ".env" -not -path "*/node_modules/*" -not -path "*/.venv/*" | grep -v ".env.example" | grep -v ".env.local"; then
            echo "❌ Found .env files committed to repository!"
            exit 1
          else
            echo "✅ No .env files found in repository"
          fi
