    inputs:
      date:
        description: 'Date to check (YYYY-MM-DD)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  data-quality:
    name: Validate Data Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run data quality checks
        id: quality-check
        run: |
          python3 << 'EOF'
          import boto3
          import json
          from datetime import datetime, timedelta
          import os
          
          s3 = boto3.client('s3')
          
          # Get bucket name
          try:
              ssm = boto3.client('ssm')
              bucket = ssm.get_parameter(Name='/b3tr/bucket')['Parameter']['Value']
          except:
              print("❌ Could not get bucket name from SSM")
              exit(1)
          
          print(f"Checking data quality in bucket: {bucket}")
          
          # Check date
          check_date = "${{ github.event.inputs.date }}" or datetime.now().strftime('%Y-%m-%d')
          print(f"Checking data for date: {check_date}")
          
          issues = []
          
          # 1. Check raw data ingestion
          try:
              prefix = f"raw/quotes_5m/dt={check_date}/"
              response = s3.list_objects_v2(Bucket=bucket, Prefix=prefix)
              
              if 'Contents' not in response:
                  issues.append(f"❌ No raw data found for {check_date}")
              else:
                  file_count = len(response['Contents'])
                  print(f"✅ Found {file_count} raw data files for {check_date}")
                  
                  # Durante pregão (10h-17h BRT), esperamos ~84 arquivos (5min intervals)
                  if file_count < 50:  # Threshold flexível
                      issues.append(f"⚠️ Low raw data count: {file_count} files (expected ~84)")
          except Exception as e:
              issues.append(f"❌ Error checking raw data: {str(e)}")
          
          # 2. Check training data freshness
          try:
              response = s3.head_object(Bucket=bucket, Key="training/deepar/train.jsonl")
              last_modified = response['LastModified']
              age_days = (datetime.now(last_modified.tzinfo) - last_modified).days
              
              if age_days > 7:
                  issues.append(f"⚠️ Training data is {age_days} days old")
              else:
                  print(f"✅ Training data is {age_days} days old (fresh)")
          except:
              issues.append("❌ Training data not found")
          
          # 3. Check model artifacts
          try:
              paginator = s3.get_paginator('list_objects_v2')
              model_files = []
              
              for page in paginator.paginate(Bucket=bucket, Prefix="models/bfti/"):
                  for obj in page.get('Contents', []):
                      if obj['Key'].endswith('model.tar.gz'):
                          model_files.append(obj)
              
              if not model_files:
                  issues.append("❌ No trained models found")
              else:
                  latest_model = max(model_files, key=lambda x: x['LastModified'])
                  age_days = (datetime.now(latest_model['LastModified'].tzinfo) - latest_model['LastModified']).days
                  
                  if age_days > 3:
                      issues.append(f"⚠️ Latest model is {age_days} days old")
                  else:
                      print(f"✅ Latest model is {age_days} days old")
          except Exception as e:
              issues.append(f"❌ Error checking models: {str(e)}")
          
          # 4. Check recent predictions/rankings
          try:
              yesterday = (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d')
              prefix = f"recommendations/dt={yesterday}/"
              
              response = s3.list_objects_v2(Bucket=bucket, Prefix=prefix)
              
              if 'Contents' not in response:
                  issues.append(f"⚠️ No recommendations found for {yesterday}")
              else:
                  print(f"✅ Found recommendations for {yesterday}")
          except Exception as e:
              issues.append(f"❌ Error checking recommendations: {str(e)}")
          
          # Output results
          if issues:
              print("\n🚨 Data Quality Issues Found:")
              for issue in issues:
                  print(f"  {issue}")
              
              # Set output for GitHub Actions
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"quality_status=failed\n")
                  f.write(f"issues_count={len(issues)}\n")
          else:
              print("\n✅ All data quality checks passed!")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"quality_status=success\n")
                  f.write(f"issues_count=0\n")
          
          # Save detailed report
          report = {
              "date": check_date,
              "timestamp": datetime.now().isoformat(),
              "status": "failed" if issues else "success",
              "issues": issues,
              "checks_performed": [
                  "Raw data ingestion",
                  "Training data freshness", 
                  "Model artifacts",
                  "Recent predictions"
              ]
          }
          
          with open('data-quality-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          EOF

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: data-quality-report.json
          retention-days: 30

      - name: Create issue for quality problems
        if: steps.quality-check.outputs.quality_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('data-quality-report.json', 'utf8'));
            
            const title = `🔍 Data Quality Issues - ${report.date}`;
            const body = `
            ## Data Quality Report
            
            **Date:** ${report.date}
            **Status:** ❌ Failed
            **Issues Found:** ${report.issues.length}
            
            ### Issues Detected:
            ${report.issues.map(issue => `- ${issue}`).join('\n')}
            
            ### Checks Performed:
            ${report.checks_performed.map(check => `- ${check}`).join('\n')}
            
            ### Recommended Actions:
            1. Check Lambda function logs for ingestion errors
            2. Verify BRAPI Pro API is responding correctly
            3. Check EventBridge schedules are running
            4. Validate S3 bucket permissions
            5. Review SageMaker training job status
            
            **Auto-generated by Data Quality workflow**
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['data-quality', 'monitoring', 'bug']
            });

      - name: Post success summary
        if: steps.quality-check.outputs.quality_status == 'success'
        run: |
          echo "✅ All data quality checks passed!"
          echo "📊 Data pipeline is healthy and producing quality data."