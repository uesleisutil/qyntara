name: Security - Compliance & Best Practices

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 14 * * 4'  # Quinta-feira às 14h UTC

permissions:
  contents: read
  security-events: write

jobs:
  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install license checker
        run: npm install -g license-checker

      - name: Check Dashboard licenses
        working-directory: ./dashboard
        run: |
          npm install
          license-checker --json --out dashboard-licenses.json || true
          license-checker --summary
        continue-on-error: true

      - name: Check Infrastructure licenses
        working-directory: ./infra
        run: |
          npm install
          license-checker --json --out infra-licenses.json || true
          license-checker --summary
        continue-on-error: true

      - name: Upload license reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-compliance-reports
          path: |
            dashboard/dashboard-licenses.json
            infra/infra-licenses.json
          retention-days: 30

  security-scorecard:
    name: OpenSSF Security Scorecard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
        continue-on-error: true

  aws-security-best-practices:
    name: AWS Security Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check S3 bucket configurations
        run: |
          echo "Checking S3 security configurations in CDK..."
          
          # Check for encryption
          if grep -r "encryption:" infra/lib/ --include="*.ts"; then
            echo "✅ S3 encryption configured"
          else
            echo "⚠️ S3 encryption not explicitly configured"
          fi
          
          # Check for versioning
          if grep -r "versioned:" infra/lib/ --include="*.ts"; then
            echo "✅ S3 versioning configured"
          else
            echo "⚠️ S3 versioning not explicitly configured"
          fi
          
          # Check for public access block
          if grep -r "blockPublicAccess" infra/lib/ --include="*.ts"; then
            echo "✅ S3 public access block configured"
          else
            echo "⚠️ S3 public access block not explicitly configured"
          fi

      - name: Check Lambda configurations
        run: |
          echo "Checking Lambda security configurations..."
          
          # Check for reserved concurrent executions
          if grep -r "reservedConcurrentExecutions" infra/lib/ --include="*.ts"; then
            echo "✅ Lambda concurrency limits configured"
          else
            echo "⚠️ Lambda concurrency limits not configured"
          fi
          
          # Check for timeout configuration
          if grep -r "timeout:" infra/lib/ --include="*.ts"; then
            echo "✅ Lambda timeout configured"
          else
            echo "⚠️ Lambda timeout not explicitly configured"
          fi
          
          # Check for memory configuration
          if grep -r "memorySize:" infra/lib/ --include="*.ts"; then
            echo "✅ Lambda memory configured"
          else
            echo "⚠️ Lambda memory not explicitly configured"
          fi

      - name: Check CloudWatch configurations
        run: |
          echo "Checking CloudWatch logging and monitoring..."
          
          # Check for log retention
          if grep -r "logRetention" infra/lib/ --include="*.ts"; then
            echo "✅ CloudWatch log retention configured"
          else
            echo "⚠️ CloudWatch log retention not configured"
          fi
          
          # Check for alarms
          if grep -r "Alarm" infra/lib/ --include="*.ts"; then
            echo "✅ CloudWatch alarms configured"
          else
            echo "⚠️ CloudWatch alarms not configured"
          fi

  code-quality-security:
    name: Code Quality & Security Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis tools
        run: |
          pip install radon pylint flake8 mccabe

      - name: Run complexity analysis
        run: |
          echo "Running cyclomatic complexity analysis..."
          radon cc ml/ -a -s || true
          
          echo "Running maintainability index..."
          radon mi ml/ -s || true
        continue-on-error: true

      - name: Run Pylint security checks
        run: |
          pip install -r requirements.txt || true
          pylint ml/ \
            --disable=all \
            --enable=security \
            --output-format=json \
            > pylint-security.json || true
        continue-on-error: true

      - name: Upload code quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-reports
          path: pylint-security.json
          retention-days: 30

  git-security:
    name: Git Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          echo "Checking for large files in repository..."
          find . -type f -size +10M \
            -not -path "./.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/.venv/*" \
            | while read file; do
              echo "⚠️ Large file found: $file ($(du -h "$file" | cut -f1))"
            done

      - name: Check for binary files
        run: |
          echo "Checking for binary files..."
          find . -type f -exec file {} \; \
            | grep -v ".git" \
            | grep -v "node_modules" \
            | grep -v ".venv" \
            | grep "executable\|binary" \
            | head -20 || true

      - name: Check commit signatures
        run: |
          echo "Checking recent commit signatures..."
          git log -10 --show-signature || true
        continue-on-error: true
