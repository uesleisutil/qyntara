name: Performance Testing (Disabled)

# Temporarily disabled - uncomment when system is stable
# on:
#   schedule:
#     - cron: '0 2 * * SUN'
#   workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of performance test'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - lambda-only
          - data-pipeline
          - ml-training

permissions:
  contents: read
  issues: write

jobs:
  performance-test:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run Lambda performance tests
        if: github.event.inputs.test_type == 'full' || github.event.inputs.test_type == 'lambda-only'
        id: lambda-perf
        run: |
          python3 << 'EOF'
          import boto3
          import json
          import time
          from datetime import datetime, timedelta
          
          lambda_client = boto3.client('lambda')
          cloudwatch = boto3.client('cloudwatch')
          
          # Get Lambda functions
          functions = lambda_client.list_functions()['Functions']
          b3tr_functions = [f for f in functions if 'B3Tactical' in f['FunctionName']]
          
          print(f"Found {len(b3tr_functions)} B3TR Lambda functions")
          
          performance_data = []
          
          for func in b3tr_functions:
              func_name = func['FunctionName']
              print(f"\nTesting {func_name}...")
              
              # Get recent metrics (last 7 days)
              end_time = datetime.utcnow()
              start_time = end_time - timedelta(days=7)
              
              try:
                  # Duration metrics
                  duration_response = cloudwatch.get_metric_statistics(
                      Namespace='AWS/Lambda',
                      MetricName='Duration',
                      Dimensions=[{'Name': 'FunctionName', 'Value': func_name}],
                      StartTime=start_time,
                      EndTime=end_time,
                      Period=3600,  # 1 hour
                      Statistics=['Average', 'Maximum']
                  )
                  
                  # Memory utilization
                  memory_response = cloudwatch.get_metric_statistics(
                      Namespace='AWS/Lambda',
                      MetricName='MemoryUtilization',
                      Dimensions=[{'Name': 'FunctionName', 'Value': func_name}],
                      StartTime=start_time,
                      EndTime=end_time,
                      Period=3600,
                      Statistics=['Average', 'Maximum']
                  )
                  
                  # Error rate
                  error_response = cloudwatch.get_metric_statistics(
                      Namespace='AWS/Lambda',
                      MetricName='Errors',
                      Dimensions=[{'Name': 'FunctionName', 'Value': func_name}],
                      StartTime=start_time,
                      EndTime=end_time,
                      Period=3600,
                      Statistics=['Sum']
                  )
                  
                  # Invocation count
                  invocation_response = cloudwatch.get_metric_statistics(
                      Namespace='AWS/Lambda',
                      MetricName='Invocations',
                      Dimensions=[{'Name': 'FunctionName', 'Value': func_name}],
                      StartTime=start_time,
                      EndTime=end_time,
                      Period=3600,
                      Statistics=['Sum']
                  )
                  
                  # Calculate averages
                  avg_duration = sum(d['Average'] for d in duration_response['Datapoints']) / len(duration_response['Datapoints']) if duration_response['Datapoints'] else 0
                  max_duration = max((d['Maximum'] for d in duration_response['Datapoints']), default=0)
                  avg_memory = sum(m['Average'] for m in memory_response['Datapoints']) / len(memory_response['Datapoints']) if memory_response['Datapoints'] else 0
                  total_errors = sum(e['Sum'] for e in error_response['Datapoints'])
                  total_invocations = sum(i['Sum'] for i in invocation_response['Datapoints'])
                  
                  error_rate = (total_errors / total_invocations * 100) if total_invocations > 0 else 0
                  
                  perf_data = {
                      'function': func_name,
                      'avg_duration_ms': round(avg_duration, 2),
                      'max_duration_ms': round(max_duration, 2),
                      'avg_memory_util_pct': round(avg_memory, 2),
                      'error_rate_pct': round(error_rate, 2),
                      'total_invocations': int(total_invocations),
                      'memory_size_mb': func['MemorySize'],
                      'timeout_s': func['Timeout']
                  }
                  
                  performance_data.append(perf_data)
                  
                  print(f"  Avg Duration: {avg_duration:.2f}ms")
                  print(f"  Max Duration: {max_duration:.2f}ms")
                  print(f"  Memory Util: {avg_memory:.2f}%")
                  print(f"  Error Rate: {error_rate:.2f}%")
                  print(f"  Invocations: {int(total_invocations)}")
                  
              except Exception as e:
                  print(f"  Error getting metrics: {e}")
          
          # Save performance report
          with open('lambda-performance.json', 'w') as f:
              json.dump(performance_data, f, indent=2)
          
          # Check for performance issues
          issues = []
          for data in performance_data:
              if data['avg_duration_ms'] > 30000:  # > 30s
                  issues.append(f"High duration: {data['function']} avg {data['avg_duration_ms']}ms")
              if data['error_rate_pct'] > 5:  # > 5%
                  issues.append(f"High error rate: {data['function']} {data['error_rate_pct']}%")
              if data['avg_memory_util_pct'] > 80:  # > 80%
                  issues.append(f"High memory usage: {data['function']} {data['avg_memory_util_pct']}%")
          
          if issues:
              print(f"\n⚠️ Performance issues found:")
              for issue in issues:
                  print(f"  {issue}")
              print("lambda_perf_status=warning")
          else:
              print(f"\n✅ All Lambda functions performing well")
              print("lambda_perf_status=success")
          EOF

      - name: Test data pipeline performance
        if: github.event.inputs.test_type == 'full' || github.event.inputs.test_type == 'data-pipeline'
        id: pipeline-perf
        run: |
          python3 << 'EOF'
          import boto3
          import json
          from datetime import datetime, timedelta
          
          s3 = boto3.client('s3')
          ssm = boto3.client('ssm')
          
          try:
              bucket = ssm.get_parameter(Name='/b3tr/bucket')['Parameter']['Value']
          except:
              print("❌ Could not get bucket name")
              exit(1)
          
          print(f"Analyzing data pipeline performance for bucket: {bucket}")
          
          # Check data ingestion rate
          today = datetime.now().strftime('%Y-%m-%d')
          yesterday = (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d')
          
          pipeline_metrics = {}
          
          # Raw data ingestion
          for date in [today, yesterday]:
              prefix = f"raw/quotes_5m/dt={date}/"
              try:
                  response = s3.list_objects_v2(Bucket=bucket, Prefix=prefix)
                  file_count = len(response.get('Contents', []))
                  
                  if file_count > 0:
                      # Calculate total size
                      total_size = sum(obj['Size'] for obj in response['Contents'])
                      avg_file_size = total_size / file_count
                      
                      pipeline_metrics[date] = {
                          'files': file_count,
                          'total_size_mb': round(total_size / 1024 / 1024, 2),
                          'avg_file_size_kb': round(avg_file_size / 1024, 2)
                      }
                      
                      print(f"  {date}: {file_count} files, {total_size/1024/1024:.2f}MB total")
                  else:
                      pipeline_metrics[date] = {'files': 0, 'total_size_mb': 0, 'avg_file_size_kb': 0}
                      print(f"  {date}: No data found")
              except Exception as e:
                  print(f"  {date}: Error - {e}")
          
          # Check training data size and freshness
          try:
              train_obj = s3.head_object(Bucket=bucket, Key="training/deepar/train.jsonl")
              train_size_mb = train_obj['ContentLength'] / 1024 / 1024
              train_age_hours = (datetime.now(train_obj['LastModified'].tzinfo) - train_obj['LastModified']).total_seconds() / 3600
              
              pipeline_metrics['training_data'] = {
                  'size_mb': round(train_size_mb, 2),
                  'age_hours': round(train_age_hours, 2)
              }
              
              print(f"  Training data: {train_size_mb:.2f}MB, {train_age_hours:.1f}h old")
          except:
              pipeline_metrics['training_data'] = {'size_mb': 0, 'age_hours': 999}
              print("  Training data: Not found")
          
          # Save pipeline metrics
          with open('pipeline-performance.json', 'w') as f:
              json.dump(pipeline_metrics, f, indent=2)
          
          # Performance assessment
          issues = []
          
          # Check if we're getting expected data volume
          for date, metrics in pipeline_metrics.items():
              if date != 'training_data' and metrics['files'] < 30:  # Less than expected
                  issues.append(f"Low data volume for {date}: {metrics['files']} files")
          
          if pipeline_metrics.get('training_data', {}).get('age_hours', 0) > 48:
              issues.append("Training data is stale (>48h old)")
          
          if issues:
              print(f"\n⚠️ Pipeline performance issues:")
              for issue in issues:
                  print(f"  {issue}")
              print("pipeline_perf_status=warning")
          else:
              print(f"\n✅ Data pipeline performing well")
              print("pipeline_perf_status=success")
          EOF

      - name: Generate performance report
        run: |
          echo "# 📊 B3TR Performance Report" > performance-report.md
          echo "**Generated:** $(date -u)" >> performance-report.md
          echo "" >> performance-report.md
          
          if [ -f lambda-performance.json ]; then
              echo "## Lambda Performance" >> performance-report.md
              echo "| Function | Avg Duration | Max Duration | Memory Util | Error Rate | Invocations |" >> performance-report.md
              echo "|----------|--------------|--------------|-------------|------------|-------------|" >> performance-report.md
              
              python3 -c "
          import json
          with open('lambda-performance.json') as f:
              data = json.load(f)
          for item in data:
              print(f\"| {item['function'].split('-')[-1]} | {item['avg_duration_ms']}ms | {item['max_duration_ms']}ms | {item['avg_memory_util_pct']}% | {item['error_rate_pct']}% | {item['total_invocations']} |\")
              " >> performance-report.md
          fi
          
          if [ -f pipeline-performance.json ]; then
              echo "" >> performance-report.md
              echo "## Data Pipeline Performance" >> performance-report.md
              
              python3 -c "
          import json
          with open('pipeline-performance.json') as f:
              data = json.load(f)
          for date, metrics in data.items():
              if date != 'training_data':
                  print(f\"- **{date}**: {metrics['files']} files, {metrics['total_size_mb']}MB\")
              else:
                  print(f\"- **Training Data**: {metrics['size_mb']}MB, {metrics['age_hours']}h old\")
              " >> performance-report.md
          fi
          
          echo "" >> performance-report.md
          echo "## Recommendations" >> performance-report.md
          echo "- Monitor Lambda cold starts and consider provisioned concurrency for critical functions" >> performance-report.md
          echo "- Optimize memory allocation based on utilization patterns" >> performance-report.md
          echo "- Consider data compression for large S3 objects" >> performance-report.md
          echo "- Set up automated scaling for high-volume periods" >> performance-report.md
          
          cat performance-report.md

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            performance-report.md
            lambda-performance.json
            pipeline-performance.json
          retention-days: 90

      - name: Create performance issue if needed
        if: contains(steps.lambda-perf.outputs.lambda_perf_status, 'warning') || contains(steps.pipeline-perf.outputs.pipeline_perf_status, 'warning')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('performance-report.md', 'utf8');
            
            const title = '⚡ Performance Issues Detected';
            const body = `
            ## Performance Analysis Results
            
            **Status:** ⚠️ Issues Found
            **Test Type:** ${{ github.event.inputs.test_type || 'scheduled' }}
            
            ${report}
            
            ### Next Steps
            1. Review CloudWatch metrics for detailed analysis
            2. Consider optimizing high-duration functions
            3. Check for memory leaks or inefficient algorithms
            4. Monitor data pipeline bottlenecks
            
            **Auto-generated by Performance Testing workflow**
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['performance', 'monitoring', 'optimization']
            });