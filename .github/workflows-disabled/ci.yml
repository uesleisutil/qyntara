name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black boto3

      - name: Format check (black)
        run: black --check --diff .

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Type check (mypy)
        run: |
          pip install mypy types-boto3
          mypy ml/ --ignore-missing-imports || echo "Type checking completed with warnings"

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r ml/ -f json -o bandit-report.json || true
          bandit -r ml/ || echo "Security scan completed with warnings"

  infrastructure:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK diff (dry-run)
        working-directory: infra
        env:
          DEEPAR_IMAGE_URI: "382416733822.dkr.ecr.us-east-1.amazonaws.com/forecasting-deepar:1"
          BRAPI_SECRET_ID: "brapi/pro/token"
          ALERT_EMAIL: "test@example.com"
        run: npx cdk synth --quiet

      - name: CDK security check
        working-directory: infra
        env:
          DEEPAR_IMAGE_URI: "382416733822.dkr.ecr.us-east-1.amazonaws.com/forecasting-deepar:1"
          BRAPI_SECRET_ID: "brapi/pro/token"
          ALERT_EMAIL: "test@example.com"
        run: |
          npm install -g cdk-nag
          npx cdk synth --quiet || echo "CDK synth completed"

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README links
        run: |
          # Verificar se links no README estão funcionando
          grep -o 'http[s]*://[^)]*' README.md | head -5 | while read url; do
            echo "Checking $url"
            curl -s --head "$url" | head -1 || echo "Warning: $url may be unreachable"
          done

      - name: Validate documentation structure
        run: |
          # Verificar se documentação essencial existe
          test -f README.md && echo "✅ README.md exists"
          test -f LICENSE && echo "✅ LICENSE exists"
          test -d docs/ && echo "✅ docs/ directory exists"
          test -f docs/architecture.md && echo "✅ Architecture docs exist"
          test -f docs/deployment.md && echo "✅ Deployment docs exist"