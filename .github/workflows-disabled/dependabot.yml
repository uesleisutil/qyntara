name: Dependabot

on:
  schedule:
    - cron: '0 9 * * MON'  # Segunda-feira às 9:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable auto-merge for Dependabot PRs
        run: |
          echo "Auto-merge will be handled by Dependabot configuration"
          echo "Minor and patch updates will be auto-merged after CI passes"

  security-updates:
    name: Check Security Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python security updates
        run: |
          pip install safety
          # Check for known security vulnerabilities
          safety check --json || echo "Security check completed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Node.js security updates
        working-directory: infra
        run: |
          npm audit --audit-level=high || echo "Node audit completed"