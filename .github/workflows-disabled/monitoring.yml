name: System Monitoring (Disabled)

# Temporarily disabled - uncomment when system is stable
# on:
#   schedule:
#     - cron: '0 */6 * * *'
#   workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of monitoring check'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - data-quality

permissions:
  contents: read
  issues: write

jobs:
  system-health:
    name: Check System Health
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check Lambda functions status
        id: lambda-check
        run: |
          echo "Checking Lambda functions..."
          
          # Verificar se Lambdas estão ativas
          FUNCTIONS=$(aws lambda list-functions --query 'Functions[?contains(FunctionName, `B3Tactical`)].FunctionName' --output text)
          
          if [ -z "$FUNCTIONS" ]; then
            echo "❌ No B3TR Lambda functions found"
            echo "lambda_status=failed" >> $GITHUB_OUTPUT
          else
            echo "✅ Found Lambda functions:"
            echo "$FUNCTIONS"
            echo "lambda_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Check S3 data freshness
        id: data-check
        run: |
          echo "Checking data freshness..."
          
          # Verificar se há dados recentes no S3
          BUCKET=$(aws ssm get-parameter --name "/b3tr/bucket" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          
          if [ -n "$BUCKET" ]; then
            # Verificar dados de ingestão recentes (últimas 24h)
            RECENT_DATA=$(aws s3 ls s3://$BUCKET/raw/quotes_5m/ --recursive | tail -5)
            
            if [ -n "$RECENT_DATA" ]; then
              echo "✅ Recent data found in S3"
              echo "data_status=success" >> $GITHUB_OUTPUT
            else
              echo "⚠️ No recent data found"
              echo "data_status=warning" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ Could not find S3 bucket"
            echo "data_status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Check SageMaker training jobs
        id: sagemaker-check
        run: |
          echo "Checking SageMaker training jobs..."
          
          # Verificar jobs de treinamento recentes
          RECENT_JOBS=$(aws sagemaker list-training-jobs --sort-by CreationTime --sort-order Descending --max-items 3 --query 'TrainingJobSummaries[?contains(TrainingJobName, `b3tr`)].{Name:TrainingJobName,Status:TrainingJobStatus}' --output table)
          
          if [ -n "$RECENT_JOBS" ]; then
            echo "✅ Recent training jobs found:"
            echo "$RECENT_JOBS"
            echo "sagemaker_status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No recent training jobs found"
            echo "sagemaker_status=warning" >> $GITHUB_OUTPUT
          fi

      - name: Check CloudWatch alarms
        id: cloudwatch-check
        run: |
          echo "Checking CloudWatch alarms..."
          
          # Verificar alarmes ativos
          ALARMS=$(aws cloudwatch describe-alarms --state-value ALARM --query 'MetricAlarms[?contains(AlarmName, `B3TR`) || contains(AlarmName, `Ingestion`)].{Name:AlarmName,State:StateValue}' --output table)
          
          if [ -n "$ALARMS" ]; then
            echo "⚠️ Active alarms found:"
            echo "$ALARMS"
            echo "cloudwatch_status=warning" >> $GITHUB_OUTPUT
          else
            echo "✅ No active alarms"
            echo "cloudwatch_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Generate monitoring report
        run: |
          echo "## 📊 B3TR System Health Report" > monitoring-report.md
          echo "**Generated:** $(date -u)" >> monitoring-report.md
          echo "" >> monitoring-report.md
          
          echo "### Component Status" >> monitoring-report.md
          echo "| Component | Status |" >> monitoring-report.md
          echo "|-----------|--------|" >> monitoring-report.md
          echo "| Lambda Functions | ${{ steps.lambda-check.outputs.lambda_status == 'success' && '✅ Healthy' || '❌ Issues' }} |" >> monitoring-report.md
          echo "| Data Pipeline | ${{ steps.data-check.outputs.data_status == 'success' && '✅ Fresh Data' || steps.data-check.outputs.data_status == 'warning' && '⚠️ Stale Data' || '❌ No Data' }} |" >> monitoring-report.md
          echo "| SageMaker | ${{ steps.sagemaker-check.outputs.sagemaker_status == 'success' && '✅ Active' || '⚠️ Inactive' }} |" >> monitoring-report.md
          echo "| CloudWatch | ${{ steps.cloudwatch-check.outputs.cloudwatch_status == 'success' && '✅ No Alarms' || '⚠️ Active Alarms' }} |" >> monitoring-report.md
          
          cat monitoring-report.md

      - name: Create issue if problems detected
        if: steps.lambda-check.outputs.lambda_status == 'failed' || steps.data-check.outputs.data_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 B3TR System Health Alert';
            const body = `
            ## System Health Issues Detected
            
            **Timestamp:** ${new Date().toISOString()}
            
            ### Issues Found:
            - Lambda Status: ${{ steps.lambda-check.outputs.lambda_status }}
            - Data Status: ${{ steps.data-check.outputs.data_status }}
            - SageMaker Status: ${{ steps.sagemaker-check.outputs.sagemaker_status }}
            - CloudWatch Status: ${{ steps.cloudwatch-check.outputs.cloudwatch_status }}
            
            ### Recommended Actions:
            1. Check AWS CloudWatch logs for Lambda functions
            2. Verify BRAPI Pro API token is valid
            3. Check S3 bucket permissions
            4. Review EventBridge schedules
            
            **Auto-generated by GitHub Actions monitoring**
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'monitoring', 'urgent']
            });