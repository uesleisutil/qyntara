[extend]
useDefault = true

[allowlist]
description = "Allowlist for Predikt"
paths = [
    '''\.env\.example''',
    '''node_modules''',
    '''\.git''',
]

[[rules]]
id = "stripe-secret-key"
description = "Stripe Secret Key"
regex = '''sk_(live|test)_[a-zA-Z0-9]{20,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "stripe-webhook-secret"
description = "Stripe Webhook Secret"
regex = '''whsec_[a-zA-Z0-9]{20,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "jwt-hardcoded"
description = "Hardcoded JWT secret"
regex = '''JWT_SECRET\s*=\s*["'][a-zA-Z0-9]{16,}["']'''
tags = ["jwt", "secret"]
[rules.allowlist]
paths = ['''\.env\.example''']

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "secret"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'''
tags = ["key", "secret"]

[[rules]]
id = "database-url-with-password"
description = "Database URL with password"
regex = '''(postgres|mysql|mongodb)://[^:]+:[^@]+@'''
tags = ["database", "secret"]
